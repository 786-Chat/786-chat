name: Run preview compiler patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/786-system-1-persistence
          fetch-depth: 0

      - name: Execute isolated compiler patch
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          workflow = Path('.github/workflows/patch-preview-module-scope.yml').read_text()
          start = workflow.index("          python <<'PY'\n") + len("          python <<'PY'\n")
          end = workflow.index("\n          PY", start)
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in workflow[start:end].splitlines())
          exec(compile(script, 'preview-compiler-patch', 'exec'))
          PY

          rm .github/workflows/patch-preview-module-scope.yml
          rm .github/workflows/run-preview-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/786-admin/chat/page.tsx .github/workflows
          git commit -m "fix(preview): preserve per-file module scope"
          git push origin HEAD:feature/786-system-1-persistence
