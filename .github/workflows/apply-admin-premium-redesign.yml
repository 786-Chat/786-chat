name: Apply admin premium redesign

on:
  push:
    branches: [agent/admin-dashboard-redesign]
    paths: [.github/workflows/apply-admin-premium-redesign.yml]

permissions:
  contents: write

jobs:
  apply:
    if: contains(github.event.head_commit.message, 'persistent theme patch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/admin-dashboard-redesign
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Persist selected admin theme
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('app/786-admin/chat/page.tsx')
          s = p.read_text()
          s = s.replace(
            'import { PremiumAdminBackground, type AdminVisualTheme } from "@/components/786-admin/premium-background"',
            'import { ADMIN_THEME_STORAGE_KEY, PremiumAdminBackground, type AdminVisualTheme } from "@/components/786-admin/premium-background"'
          )
          anchor = '''const visualThemes: Record<ThemeName, AdminVisualTheme> = {\n  purple: "cosmic",\n  green: "emerald",\n  blue: "ocean",\n  navy: "midnight",\n  white: "pearl",\n}\n'''
          replacement = anchor + '''\nconst themeNamesByVisual: Record<AdminVisualTheme, ThemeName> = {\n  cosmic: "purple",\n  emerald: "green",\n  ocean: "blue",\n  midnight: "navy",\n  pearl: "white",\n}\n'''
          s = s.replace(anchor, replacement)
          effect_anchor = '  useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }) }, [messages.length, sending])\n'
          effect = effect_anchor + '''  useEffect(() => {\n    try {\n      const saved = localStorage.getItem(ADMIN_THEME_STORAGE_KEY) as AdminVisualTheme | null\n      if (saved && themeNamesByVisual[saved]) setTheme(themeNamesByVisual[saved])\n    } catch {}\n  }, [])\n'''
          s = s.replace(effect_anchor, effect)
          p.write_text(s)
          PY
      - name: Commit persistent theme
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/786-admin/chat/page.tsx
          git commit -m "feat(admin-ui): persist selected theme across admin pages"
          git push origin HEAD:agent/admin-dashboard-redesign
