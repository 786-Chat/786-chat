name: Fix preview compiler scope

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Isolate generated source scopes
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('app/786-admin/chat/page.tsx')
          text = path.read_text()
          old = '''  const componentBodies = sourceEntries
    .map(([, src]) => transformPreviewSource(src).body)
    .filter((body) => body.length > 0)
    .join("\\n\\n")
'''
          new = '''  const componentBodies = sourceEntries
    .map(([path, src]) => {
      const transformed = transformPreviewSource(src)
      if (!transformed.body) return ""

      const publishedNames = new Set<string>()
      const declarationRe = /(?:^|\\n)\\s*(?:async\\s+)?(?:function|class|const|let|var)\\s+([A-Za-z_$][\\w$]*)/g
      let declarationMatch: RegExpExecArray | null

      while ((declarationMatch = declarationRe.exec(transformed.body)) !== null) {
        const name = declarationMatch[1]
        if (/^[A-Z]/.test(name) || name === transformed.defaultName) publishedNames.add(name)
      }

      if (transformed.defaultName) publishedNames.add(transformed.defaultName)

      const publish = Array.from(publishedNames)
        .map((name) => `if (typeof ${name} !== 'undefined') globalThis.${name} = ${name};`)
        .join("\\n")

      return `// ${path}\\n(function(){\\n${transformed.body}\\n${publish}\\n})();`
    })
    .filter((body) => body.length > 0)
    .join("\\n\\n")
'''
          if old not in text:
              raise SystemExit('Target compiler block not found')
          path.write_text(text.replace(old, new, 1))
          PY
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add app/786-admin/chat/page.tsx
          git commit -m "Fix preview compiler module scopes"
          git push origin HEAD:main
