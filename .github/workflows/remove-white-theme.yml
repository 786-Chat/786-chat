name: Remove white theme

on:
  push:
    branches: [agent/fix-white-theme]
    paths: [.github/workflows/remove-white-theme.yml]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-white-theme
      - name: Remove White Mode safely
        run: |
          python - <<'PY'
          from pathlib import Path

          p = Path('app/786-admin/chat/page.tsx')
          s = p.read_text()
          s = s.replace('import whiteThemeStyles from "@/components/786-admin/white-theme-overrides.module.css"\n', '')
          s = s.replace('type ThemeName = "purple" | "green" | "blue" | "navy" | "white"', 'type ThemeName = "purple" | "green" | "blue" | "navy"')
          s = s.replace('  white: "pearl",\n', '')
          s = s.replace('  pearl: "white",', '  pearl: "purple",')
          s = s.replace('  white: { name: "White Mode", sub: "Clean & Minimal", swatch: "from-white via-slate-100 to-slate-300", shell: "from-[#f8fafc] via-white to-[#eef2ff]", accent: "148,163,184" },\n', '')
          s = s.replace('  const isLightTheme = theme === "white"\n', '')
          s = s.replace('<main className={`relative h-screen overflow-hidden bg-gradient-to-br ${activeTheme.shell} ${isLightTheme ? whiteThemeStyles.lightTheme : "text-white"}`} style={{ ["--accent" as string]: activeTheme.accent }}>', '<main className={`relative h-screen overflow-hidden bg-gradient-to-br ${activeTheme.shell} text-white`} style={{ ["--accent" as string]: activeTheme.accent }}>')
          p.write_text(s)
          PY
          rm -f components/786-admin/white-theme-overrides.module.css
      - name: Commit removal
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(admin-ui): remove unusable white theme"
          git push origin HEAD:agent/fix-white-theme
