name: Preview scope fix
on:
  push:
    branches: [feature/786-system-1-persistence]
permissions:
  contents: write
jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/786-system-1-persistence
      - run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('app/786-admin/chat/page.tsx')
          s = p.read_text()
          old = '''  const sourceBodies = sourceEntries
    .map(([, src]) => transformPreviewSource(src as string).body)
    .filter((b) => b.length > 0)
    .join("\\n\\n")
'''
          new = '''  const sourceBodies = sourceEntries
    .map(([path, src]) => {
      const transformed = transformPreviewSource(src as string)
      if (!transformed.body) return ""
      const publishedNames = new Set<string>()
      const declarationRe = /(?:^|\\n)\\s*(?:async\\s+)?(?:function|class|const|let|var)\\s+([A-Za-z_$][\\w$]*)/g
      let declarationMatch: RegExpExecArray | null
      while ((declarationMatch = declarationRe.exec(transformed.body)) !== null) {
        const name = declarationMatch[1]
        if (/^[A-Z]/.test(name) || name === transformed.defaultName) publishedNames.add(name)
      }
      if (transformed.defaultName) publishedNames.add(transformed.defaultName)
      const publish = Array.from(publishedNames)
        .map((name) => `if (typeof ${name} !== 'undefined') globalThis.${name} = ${name};`)
        .join("\\n")
      return `// ${path}\\n(function(){\\n${transformed.body}\\n${publish}\\n})();`
    })
    .filter((b) => b.length > 0)
    .join("\\n\\n")
'''
          if old not in s:
              raise SystemExit('target block missing')
          p.write_text(s.replace(old, new, 1))
          PY
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add app/786-admin/chat/page.tsx
          git commit -m "fix(preview): isolate source file scopes"
          git push origin HEAD:feature/786-system-1-persistence
