name: Patch preview compiler module scope

on:
  push:
    branches:
      - feature/786-system-1-persistence

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/786-system-1-persistence
          fetch-depth: 0

      - name: Patch preview compiler only
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path('app/786-admin/chat/page.tsx')
          text = path.read_text()

          transform_start = text.index('function transformPreviewSource')
          transform_end = text.index('function buildEmptyPreview', transform_start)
          files_start = text.index('function filesToHtml', transform_end)
          files_end = text.index('\ntype ActiveProject', files_start)

          transform = r'''type PreviewModuleTransform = {
  body: string
}

function normalizePreviewPath(path: string): string {
  const parts: string[] = []
  for (const part of path.replace(/\\/g, "/").split("/")) {
    if (!part || part === ".") continue
    if (part === "..") parts.pop()
    else parts.push(part)
  }
  return parts.join("/")
}

function transformPreviewModule(src: string): PreviewModuleTransform {
  const namedExports = new Set<string>()
  let defaultName: string | null = null
  let importIndex = 0
  let s = src.replace(/^[\"']use (client|server)[\"']\s*;?\s*\n?/m, "")

  s = s.replace(/^\s*import\s+type\s+[\s\S]*?from\s+[\"'][^\"']+[\"']\s*;?\s*$/gm, "")
  s = s.replace(/^\s*import\s+[\"'][^\"']+\.(css|scss|sass|less)[\"']\s*;?\s*$/gm, "")
  s = s.replace(/^\s*import\s+([\s\S]*?)\s+from\s+[\"']([^\"']+)[\"']\s*;?\s*$/gm, (_full, rawClause: string, specifier: string) => {
    const clause = rawClause.trim()
    const ref = `__imported_${importIndex++}`
    const lines = [`const ${ref} = __require(${JSON.stringify(specifier)}, __filename)`]

    if (clause.startsWith("{")) {
      const inside = clause.slice(1, -1)
      for (const item of inside.split(",")) {
        const part = item.trim()
        if (!part || part.startsWith("type ")) continue
        const pieces = part.split(/\s+as\s+/i).map((value) => value.trim())
        const imported = pieces[0]
        const local = pieces[1] || imported
        if (/^[A-Za-z_$][\w$]*$/.test(imported) && /^[A-Za-z_$][\w$]*$/.test(local)) {
          lines.push(`const ${local} = ${ref}[${JSON.stringify(imported)}]`)
        }
      }
    } else if (clause.startsWith("*")) {
      const match = clause.match(/^\*\s+as\s+([A-Za-z_$][\w$]*)$/)
      if (match) lines.push(`const ${match[1]} = ${ref}`)
    } else {
      const comma = clause.indexOf(",")
      const defaultLocal = (comma >= 0 ? clause.slice(0, comma) : clause).trim()
      if (/^[A-Za-z_$][\w$]*$/.test(defaultLocal)) {
        lines.push(`const ${defaultLocal} = ${ref}.default ?? ${ref}`)
      }
      if (comma >= 0) {
        const remainder = clause.slice(comma + 1).trim()
        if (remainder.startsWith("{")) {
          const inside = remainder.slice(1, -1)
          for (const item of inside.split(",")) {
            const part = item.trim()
            if (!part || part.startsWith("type ")) continue
            const pieces = part.split(/\s+as\s+/i).map((value) => value.trim())
            const imported = pieces[0]
            const local = pieces[1] || imported
            if (/^[A-Za-z_$][\w$]*$/.test(imported) && /^[A-Za-z_$][\w$]*$/.test(local)) {
              lines.push(`const ${local} = ${ref}[${JSON.stringify(imported)}]`)
            }
          }
        } else {
          const match = remainder.match(/^\*\s+as\s+([A-Za-z_$][\w$]*)$/)
          if (match) lines.push(`const ${match[1]} = ${ref}`)
        }
      }
    }
    return lines.join("\n")
  })
  s = s.replace(/^\s*import\s+[\"']([^\"']+)[\"']\s*;?\s*$/gm, (_full, specifier: string) => {
    return `__require(${JSON.stringify(specifier)}, __filename)`
  })

  s = s.replace(/export\s+default\s+async\s+function\s+([A-Za-z_$][\w$]*)/g, (_full, name: string) => {
    defaultName = name
    return `async function ${name}`
  })
  s = s.replace(/export\s+default\s+function\s+([A-Za-z_$][\w$]*)/g, (_full, name: string) => {
    defaultName = name
    return `function ${name}`
  })
  s = s.replace(/export\s+default\s+class\s+([A-Za-z_$][\w$]*)/g, (_full, name: string) => {
    defaultName = name
    return `class ${name}`
  })
  s = s.replace(/export\s+default\s+function\s*\(/g, () => {
    defaultName = "__DefaultExport__"
    return "function __DefaultExport__("
  })
  s = s.replace(/export\s+default\s+class\s*\{/g, () => {
    defaultName = "__DefaultExport__"
    return "class __DefaultExport__ {"
  })
  s = s.replace(/export\s+default\s+([A-Za-z_$][\w$]*)\s*;?/g, (_full, name: string) => {
    defaultName = name
    return ""
  })
  s = s.replace(/export\s+default\s+/g, () => {
    defaultName = "__DefaultExport__"
    return "const __DefaultExport__ = "
  })

  s = s.replace(/\bexport\s+(async\s+function|function|class|const|let|var)\s+([A-Za-z_$][\w$]*)/g, (_full, kind: string, name: string) => {
    namedExports.add(name)
    return `${kind} ${name}`
  })
  s = s.replace(/^\s*export\s*\{([^}]*)\}\s*;?\s*$/gm, (_full, list: string) => {
    const assignments: string[] = []
    for (const item of list.split(",")) {
      const part = item.trim()
      if (!part || part.startsWith("type ")) continue
      const pieces = part.split(/\s+as\s+/i).map((value) => value.trim())
      const local = pieces[0]
      const exported = pieces[1] || local
      if (/^[A-Za-z_$][\w$]*$/.test(local) && /^[A-Za-z_$][\w$]*$/.test(exported)) {
        assignments.push(`exports[${JSON.stringify(exported)}] = ${local}`)
      }
    }
    return assignments.join("\n")
  })
  s = s.replace(/^\s*export\s*\{([^}]*)\}\s+from\s+[\"']([^\"']+)[\"']\s*;?\s*$/gm, (_full, list: string, specifier: string) => {
    const ref = `__reexport_${importIndex++}`
    const assignments = [`const ${ref} = __require(${JSON.stringify(specifier)}, __filename)`]
    for (const item of list.split(",")) {
      const part = item.trim()
      if (!part || part.startsWith("type ")) continue
      const pieces = part.split(/\s+as\s+/i).map((value) => value.trim())
      const imported = pieces[0]
      const exported = pieces[1] || imported
      assignments.push(`exports[${JSON.stringify(exported)}] = ${ref}[${JSON.stringify(imported)}]`)
    }
    return assignments.join("\n")
  })
  s = s.replace(/^\s*export\s+\*\s+from\s+[\"']([^\"']+)[\"']\s*;?\s*$/gm, (_full, specifier: string) => {
    return `Object.assign(exports, __require(${JSON.stringify(specifier)}, __filename))`
  })
  s = s.replace(/^\s*export\s+(type|interface|enum)\b[\s\S]*?(?=\n(?:export|import|const|let|var|function|class|type|interface|enum)|$)/gm, "")

  const footer = [
    ...Array.from(namedExports).map((name) => `exports[${JSON.stringify(name)}] = ${name}`),
    defaultName ? `exports.default = ${defaultName}` : "",
  ].filter(Boolean).join("\n")

  return { body: `${s.trim()}\n${footer}`.trim() }
}

'''

          files = r'''function filesToHtml(files: SevenEightSixProjectFileMap | undefined): string {
  if (!files || Object.keys(files).length === 0) {
    return buildEmptyPreview("", "Preview will appear here once a project is generated.")
  }

  const pagePath = ["app/page.tsx", "app/page.jsx", "src/app/page.tsx", "src/app/page.jsx"].find(
    (p) => typeof files[p] === "string" && (files[p] as string).trim().length > 0
  )

  const rawCss = files["app/globals.css"] || files["src/app/globals.css"] || ""
  const css = rawCss.replace(/@tailwind\s+[a-z]+\s*;?/gi, "").trim()

  if (!pagePath) {
    return buildEmptyPreview(css, "No app/page.tsx in this project — preview unavailable.")
  }

  const isSourceFile = (path: string) => /\.(tsx?|jsx?)$/.test(path) && !/\.d\.ts$/.test(path)
  const isLayoutFile = (path: string) => /^(src\/)?app\/layout\.(tsx?|jsx?)$/.test(path)
  const sourceEntries = Object.entries(files).filter(([path]) => isSourceFile(path) && !isLayoutFile(path))

  const moduleDefinitions = sourceEntries.map(([path, source]) => {
    const normalizedPath = normalizePreviewPath(path)
    const transformed = transformPreviewModule(source as string)
    return `${JSON.stringify(normalizedPath)}: function(module, exports, __require, __filename) {\n${transformed.body}\n}`
  }).join(",\n")

  const userModules = escapePreviewScript(`{\n${moduleDefinitions}\n}`)
  const entryPath = normalizePreviewPath(pagePath)

  return `<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdn.tailwindcss.com"></script>
<style>${escapePreviewScript(css)}</style>
<style>
html,body{margin:0;padding:0;background:#ffffff;color:#0f172a;font-family:Inter,system-ui,-apple-system,sans-serif}
#__preview_loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#050713;color:#67e8f9;font-size:13px;letter-spacing:0.18em;text-transform:uppercase;z-index:9999}
#__preview_loading span{display:inline-block;width:8px;height:8px;margin:0 3px;background:#22d3ee;border-radius:99px;animation:__pl 1s infinite ease-in-out both}
#__preview_loading span:nth-child(2){animation-delay:0.12s}
#__preview_loading span:nth-child(3){animation-delay:0.24s}
@keyframes __pl{0%,80%,100%{opacity:0.25;transform:translateY(0)}40%{opacity:1;transform:translateY(-4px)}}
#__preview_error{padding:24px;margin:24px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:#fca5a5;background:#1f0a0a;border:1px solid #7f1d1d;border-radius:12px;white-space:pre-wrap;font-size:12px;line-height:1.6}
</style>
</head>
<body>
<div id="__preview_loading"><span></span><span></span><span></span></div>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<script type="text/babel" data-presets="env,react,typescript">
function __786_signal_ready(){try{parent.postMessage({type:'786-preview-ready'},'*')}catch(e){}}
function __786_signal_error(msg){try{parent.postMessage({type:'786-preview-error',error:String(msg)},'*')}catch(e){}}
try {
  const { useState, useEffect, useMemo, useCallback, useRef, useReducer, useContext, createContext, Fragment, forwardRef, memo, Children, cloneElement, isValidElement } = React
  const Link = ({ children, href, ...rest }) => React.createElement('a', Object.assign({ href }, rest), children)
  const Image = ({ src, alt, width, height, fill, priority, ...rest }) => React.createElement('img', Object.assign({ src, alt, width, height }, rest))
  const __makeIcon = (name) => (props = {}) => React.createElement('span', Object.assign({}, props, { 'data-icon': name, 'aria-hidden': true, className: 'inline-block align-middle w-4 h-4 ' + (props.className || '') }))
  const __cn = (...args) => args.flat(Infinity).filter(Boolean).map(a => typeof a === 'string' ? a : Object.entries(a || {}).filter(([,v]) => v).map(([k]) => k).join(' ')).join(' ')
  const __modules = ${userModules}
  const __cache = Object.create(null)

  function __normalize(path) {
    const parts = []
    String(path || '').replace(/\\\\/g, '/').split('/').forEach((part) => {
      if (!part || part === '.') return
      if (part === '..') parts.pop()
      else parts.push(part)
    })
    return parts.join('/')
  }

  function __resolve(specifier, importer) {
    if (specifier.startsWith('@/')) return __normalize(specifier.slice(2))
    if (specifier.startsWith('./') || specifier.startsWith('../')) {
      const base = importer.includes('/') ? importer.slice(0, importer.lastIndexOf('/') + 1) : ''
      return __normalize(base + specifier)
    }
    return specifier
  }

  function __findModule(id) {
    const candidates = [id, id + '.tsx', id + '.ts', id + '.jsx', id + '.js', id + '/index.tsx', id + '/index.ts', id + '/index.jsx', id + '/index.js']
    return candidates.find((candidate) => Object.prototype.hasOwnProperty.call(__modules, candidate)) || null
  }

  function __external(specifier) {
    if (specifier === 'react') return Object.assign({ default: React }, React)
    if (specifier === 'react-dom' || specifier === 'react-dom/client') return Object.assign({ default: ReactDOM }, ReactDOM)
    if (specifier === 'next/link') return { default: Link }
    if (specifier === 'next/image') return { default: Image }
    if (specifier === 'next/navigation') return {
      useRouter: () => ({ push: (href) => { window.location.hash = String(href || '') }, replace: (href) => { window.location.hash = String(href || '') }, back: () => history.back() }),
      usePathname: () => window.location.hash.slice(1) || '/',
      useSearchParams: () => new URLSearchParams(window.location.search),
    }
    if (specifier === 'lucide-react') return new Proxy({}, { get: (_target, name) => __makeIcon(String(name)) })
    if (specifier === 'clsx') return { default: __cn, clsx: __cn }
    if (specifier === 'tailwind-merge') return { twMerge: __cn }
    if (specifier === 'class-variance-authority') return { cva: (base) => (...inputs) => __cn(base, ...inputs) }
    return {}
  }

  function __require(specifier, importer) {
    const resolved = __resolve(specifier, importer || '')
    const moduleId = __findModule(resolved)
    if (!moduleId) return __external(resolved)
    if (__cache[moduleId]) return __cache[moduleId].exports
    const module = { exports: {} }
    __cache[moduleId] = module
    __modules[moduleId](module, module.exports, __require, moduleId)
    return module.exports
  }

  const __entry = __require(${JSON.stringify(entryPath)}, '')
  const __Root__ = __entry.default || __entry.Page || null
  const __mount__ = document.getElementById('root')
  const __loader__ = document.getElementById('__preview_loading')
  if (!__Root__) {
    if (__loader__) __loader__.remove()
    __mount__.innerHTML = '<div id="__preview_error">Preview error: could not find default export in app/page.tsx</div>'
    __786_signal_error('No default export found in app/page.tsx')
  } else {
    ReactDOM.createRoot(__mount__).render(React.createElement(__Root__))
    requestAnimationFrame(() => {
      if (__loader__) __loader__.remove()
      __786_signal_ready()
    })
  }
} catch (err) {
  const __loader__ = document.getElementById('__preview_loading')
  if (__loader__) __loader__.remove()
  const el = document.getElementById('root')
  if (el) {
    el.innerHTML = '<div id="__preview_error">Preview error: ' + (err && err.message ? String(err.message) : String(err)) + '</div>'
  }
  __786_signal_error(err && err.message ? err.message : String(err))
  console.error('[786.Chat preview]', err)
}
</script>
</body>
</html>`
}
'''

          updated = text[:transform_start] + transform + text[transform_end:files_start] + files + text[files_end:]
          if updated == text:
              raise SystemExit('Preview compiler patch made no changes')
          path.write_text(updated)
          PY

