name: Apply white theme repair

on:
  push:
    branches: [agent/fix-white-theme]
    paths: [.github/workflows/apply-white-theme-fix.yml]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-white-theme
      - name: Patch theme-aware admin workspace
        run: |
          python - <<'PY'
          from pathlib import Path

          p = Path('app/786-admin/chat/page.tsx')
          s = p.read_text()
          s = s.replace(
            'import { PremiumAdminBackground, type AdminVisualTheme } from "@/components/786-admin/premium-background"',
            'import { PremiumAdminBackground, type AdminVisualTheme } from "@/components/786-admin/premium-background"\nimport whiteThemeStyles from "@/components/786-admin/white-theme-overrides.module.css"'
          )
          s = s.replace(
            '  const activeTheme = themes[theme]\n  const ActiveDeviceIcon = devices[device].icon',
            '  const activeTheme = themes[theme]\n  const isLightTheme = theme === "white"\n  const ActiveDeviceIcon = devices[device].icon'
          )
          s = s.replace(
            '<main className={`relative h-screen overflow-hidden bg-gradient-to-br ${activeTheme.shell} text-white`} style={{ ["--accent" as string]: activeTheme.accent }}>',
            '<main className={`relative h-screen overflow-hidden bg-gradient-to-br ${activeTheme.shell} ${isLightTheme ? whiteThemeStyles.lightTheme : "text-white"}`} style={{ ["--accent" as string]: activeTheme.accent }}>'
          )
          s = s.replace(
            "onClick={() => { setTheme(key); setThemeOpen(false); setRefreshKey((v) => v + 1) }}",
            "onClick={() => { setTheme(key); try { localStorage.setItem(ADMIN_THEME_STORAGE_KEY, visualThemes[key]) } catch {}; setThemeOpen(false); setRefreshKey((v) => v + 1) }}"
          )
          p.write_text(s)

          p = Path('components/786-admin/premium-background.tsx')
          s = p.read_text()
          s = s.replace('"--admin-tertiary": "168 85 247",', '"--admin-tertiary": "125 211 252",')
          s = s.replace('"--admin-bg-start": "235 239 255",', '"--admin-bg-start": "248 250 252",')
          s = s.replace('"--admin-bg-mid": "245 247 255",', '"--admin-bg-mid": "241 245 249",')
          s = s.replace('"--admin-bg-end": "226 232 255",', '"--admin-bg-end": "226 232 240",')
          p.write_text(s)
          PY
      - name: Commit repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/786-admin/chat/page.tsx components/786-admin/premium-background.tsx
          git commit -m "fix(admin-ui): make white theme readable and neutral"
          git push origin HEAD:agent/fix-white-theme
