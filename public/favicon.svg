<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#0a3530"/>
      <stop offset="50%" stop-color="#061a20"/>
      <stop offset="100%" stop-color="#020c12"/>
    </radialGradient>
  </defs>
  <circle cx="32" cy="32" r="31" fill="url(#bg)"/>
  <!-- Latitude lines -->
  <ellipse cx="32" cy="20" rx="24" ry="2" fill="none" stroke="#00cc77" stroke-width="0.8" opacity="0.35"/>
  <ellipse cx="32" cy="28" rx="27" ry="2" fill="none" stroke="#00cc77" stroke-width="0.8" opacity="0.35"/>
  <ellipse cx="32" cy="36" rx="27" ry="2" fill="none" stroke="#00cc77" stroke-width="0.8" opacity="0.35"/>
  <ellipse cx="32" cy="44" rx="24" ry="2" fill="none" stroke="#00cc77" stroke-width="0.8" opacity="0.35"/>
  <!-- Equator -->
  <ellipse cx="32" cy="32" rx="27" ry="2.5" fill="none" stroke="#00e088" stroke-width="1" opacity="0.5"/>
  <!-- Longitude curves -->
  <ellipse cx="22" cy="32" rx="8" ry="27" fill="none" stroke="#0088ee" stroke-width="0.8" opacity="0.3"/>
  <ellipse cx="32" cy="32" rx="8" ry="27" fill="none" stroke="#0088ee" stroke-width="0.8" opacity="0.3"/>
  <ellipse cx="42" cy="32" rx="8" ry="27" fill="none" stroke="#0088ee" stroke-width="0.8" opacity="0.3"/>
  <!-- Dots -->
  <circle cx="20" cy="22" r="2" fill="#00e088" opacity="0.8"/>
  <circle cx="42" cy="20" r="2" fill="#00aaff" opacity="0.8"/>
  <circle cx="32" cy="32" r="2.5" fill="#00e088" opacity="0.9"/>
  <circle cx="22" cy="42" r="2" fill="#00aaff" opacity="0.8"/>
  <circle cx="45" cy="38" r="2" fill="#00e088" opacity="0.8"/>
  <circle cx="48" cy="27" r="1.5" fill="#00aaff" opacity="0.7"/>
  <!-- Connection lines -->
  <line x1="20" y1="22" x2="32" y2="32" stroke="#00cc77" stroke-width="0.6" opacity="0.25"/>
  <line x1="42" y1="20" x2="32" y2="32" stroke="#0088ee" stroke-width="0.6" opacity="0.25"/>
  <line x1="32" y1="32" x2="22" y2="42" stroke="#00cc77" stroke-width="0.6" opacity="0.25"/>
  <line x1="32" y1="32" x2="45" y2="38" stroke="#0088ee" stroke-width="0.6" opacity="0.25"/>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="30.5" fill="none" stroke="#00cc77" stroke-width="0.5" opacity="0.35"/>
</svg>
